# Documented exceptions for Trivy findings.
#
# The entries below are OS-level packages inherited from the python:3.12-slim
# base image (perl, util-linux/mount/ncurses/gzip/acl utilities) — none of
# them are installed or invoked by the app at runtime (production doesn't
# even run apt-get; see Dockerfile). All have status "affected"/"fix_deferred"
# upstream as of 2026-07-16 — no patched Debian package exists yet, so
# nothing short of removing the packages (risking breakage of the base
# image's own tooling) would change this. Re-evaluate when Dependabot bumps
# the base image digest (see .github/dependabot.yml) in case a fix lands.
vulnerabilities:
  - id: CVE-2026-53615 # util-linux family (bsdutils, libblkid1, libmount1, libuuid1, mount, ...) — not used at runtime
    statement: "Base-image util-linux utilities, unused at runtime; no upstream fix yet. Reviewed 2026-07-16."
  - id: CVE-2026-13221 # perl-base — perl isn't invoked by the app
    statement: "Base-image perl, unused at runtime; no upstream fix yet. Reviewed 2026-07-16."
  - id: CVE-2026-42496
    statement: "Base-image perl-Archive-Tar, unused at runtime; fix deferred upstream. Reviewed 2026-07-16."
