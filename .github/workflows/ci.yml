name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Least-privilege default: none of the jobs below need to write anything
# (no PR comments, no releases, no pushes). Escalate per-job if that ever
# changes, rather than raising this default.
permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build dev image
        run: make docker-build-dev

      - name: Lint
        run: make lint

      - name: Check formatting
        run: make format-check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build dev image
        run: make docker-build-dev

      - name: Test
        run: make test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build dev image
        run: make docker-build-dev

      - name: Type check
        run: make typecheck

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build dev image
        run: make docker-build-dev

      - name: Verify poetry.lock is in sync with pyproject.toml
        run: make lock-check

  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify LICENSE file exists
        run: test -f LICENSE

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy filesystem scan (dependencies, secrets, IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build production image
        run: make docker-build

      - name: Trivy image scan (production image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: avocadodash:latest
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore.yaml
