name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev image
        run: make docker-build-dev

      - name: Lint
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Test
        run: make test

  lock-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev image
        run: make docker-build-dev

      - name: Verify poetry.lock is in sync with pyproject.toml
        run: make lock-check
